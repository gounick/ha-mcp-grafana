name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and changelog
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract the changelog section for this version from CHANGELOG.md
          SECTION=$(awk '/^## '${VERSION}'/{flag=1; next} /^## [0-9]/{flag=0} flag{print}' grafana_mcp/CHANGELOG.md || true)
          # Trim trailing blank lines
          SECTION=$(echo "$SECTION" | sed -z 's/\n*$//')

          # If no section found, fallback to a generic message
          if [ -z "$SECTION" ]; then
            SECTION="Release ${VERSION}."
          fi

          # Write multi-line output
          {
            echo "notes<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.meta.outputs.notes }}
          draft: false
          prerelease: false
